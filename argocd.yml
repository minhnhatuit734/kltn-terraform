apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kltn-dev
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/minhnhatuit734/k8s-manifests.git
    targetRevision: main
    path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true